sources:
  - name: jaffle_shop
    description: this is a clone of a Postgres database
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: raw customers data
        columns:
          - name: id
            description: the primary key for the customers table
          # configure data tests for the id column
            data_tests:
              - unique
              - not_null
      - name: orders
      # configure freshness for the orders source model
        config: 
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after: 
              count: 48
              period: hour

          loaded_at_field: _etl_loaded_at
