sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        columns:
          - name: id
          # configure data tests for the id column
            data_tests:
              - unique
              - not_null
      - name: orders
      # configure freshness for the orders source model
        config: 
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after: 
              count: 48
              period: hour

          loaded_at_field: _etl_loaded_at
